<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>S-ARMS VOC 지식베이스</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root{
    --bg: #0c1622;
    --bg-grid: #101d2e;
    --panel: #142236;
    --panel-2: #182943;
    --line: #24374f;
    --line-soft: #1c3049;
    --text: #e7edf5;
    --text-dim: #9fb0c3;
    --text-faint: #64778e;
    --cyan: #57e6d4;
    --cyan-dim: #2f8f85;
    --amber: #f2a949;
    --red: #e8676a;
    --radius: 3px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:
      radial-gradient(ellipse at top, #101f33 0%, var(--bg) 55%),
      var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans KR', sans-serif;
    min-height:100vh;
    position:relative;
  }
  /* faint blueprint grid */
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 42px 42px;
    opacity:.35;
    pointer-events:none;
    z-index:0;
  }
  .wrap{
    position:relative;
    z-index:1;
    max-width: 980px;
    margin: 0 auto;
    padding: 40px 22px 80px;
  }

  /* ---------- Header ---------- */
  .sys-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    letter-spacing:.18em;
    color: var(--cyan-dim);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .sys-label .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--cyan);
    box-shadow: 0 0 8px 1px var(--cyan);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:.35; }
  }
  .h1-btn{
    display:block;
    font-family:'IBM Plex Sans KR', sans-serif;
    font-size: 34px;
    font-weight:700;
    letter-spacing:-.01em;
    margin: 0 0 8px;
    padding: 0;
    background: none;
    border: none;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    transition: color .15s ease;
  }
  .h1-btn:hover{ color: var(--cyan); }
  .h1-btn:active{ transform: translateY(1px); }
  .sub{
    color: var(--text-dim);
    font-size: 17px;
    line-height:1.6;
    margin: 0 0 30px;
    max-width: 640px;
  }

  /* ---------- Search console ---------- */
  .console{
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: 0 20px 60px -30px rgba(0,0,0,.7);
  }
  .console-inner{
    border: 1px solid var(--line-soft);
    border-radius: 2px;
    padding: 16px;
    background:
      linear-gradient(90deg, rgba(87,230,212,.04), transparent 40%);
  }
  .console-top{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--text-faint);
    margin-bottom:12px;
    letter-spacing:.05em;
  }
  .console-top .tag{
    color: var(--cyan);
    border:1px solid var(--cyan-dim);
    padding: 1px 7px;
    border-radius: 2px;
  }
  .search-row{
    display:flex;
    gap:8px;
  }
  .search-row input{
    flex:1;
    background: #0b1420;
    border: 1px solid var(--line);
    color: var(--text);
    font-family:'IBM Plex Sans KR', sans-serif;
    font-size: 18px;
    padding: 13px 14px;
    border-radius: 2px;
    outline:none;
    transition: border-color .15s ease;
  }
  .search-row input::placeholder{ color: var(--text-faint); }
  .search-row input:focus{ border-color: var(--cyan-dim); }
  .search-row button{
    background: var(--cyan);
    color: #06231f;
    border:none;
    font-weight:600;
    font-size: 17px;
    padding: 0 20px;
    border-radius: 2px;
    cursor:pointer;
    font-family:'IBM Plex Sans KR', sans-serif;
    transition: filter .15s ease, transform .1s ease;
    white-space:nowrap;
  }
  .search-row button:hover{ filter: brightness(1.08); }
  .search-row button:active{ transform: translateY(1px); }
  .search-row button:disabled{
    background: var(--line);
    color: var(--text-faint);
    cursor:default;
  }
  .quick-chips{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:12px;
  }
  .chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    color: var(--text-dim);
    background: rgba(255,255,255,.02);
    border:1px solid var(--line);
    padding: 5px 10px;
    border-radius: 2px;
    cursor:pointer;
    transition: border-color .15s, color .15s;
  }
  .chip:hover{ border-color: var(--cyan-dim); color: var(--cyan); }

  /* result panel */
  .result{
    margin-top: 14px;
    border-top: 1px solid var(--line-soft);
    padding-top: 14px;
    display:none;
  }
  .result.show{ display:block; }
  .result-meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--text-faint);
    margin-bottom:8px;
    display:flex;
    gap:8px;
    align-items:center;
  }
  .result-meta .q-echo{
    color: var(--text-dim);
  }
  .result-body{
    font-size:17px;
    line-height:1.75;
    color: var(--text);
    white-space:pre-wrap;
  }
  .result-body strong{ color: var(--cyan); font-weight:600; }
  .loading-line{
    display:flex; align-items:center; gap:10px;
    color: var(--text-faint);
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
  }
  .spinner{
    width:12px; height:12px;
    border-radius:50%;
    border: 2px solid var(--line);
    border-top-color: var(--cyan);
    animation: spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .err{ color: var(--red); }

  /* ---------- Tabs ---------- */
  .tabs-section{ margin-top: 34px; }
  .tabs-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .tabs-head h2{
    font-size:15px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color: var(--text-faint);
    font-weight:600;
    margin:0;
  }
  .tabs-count{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--text-faint);
  }
  .tab-bar{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    border-bottom: 1px solid var(--line-soft);
    padding-bottom: 12px;
    margin-bottom: 4px;
  }
  .tab-btn{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family:'IBM Plex Sans KR', sans-serif;
    font-size: 15.5px;
    font-weight:500;
    padding: 8px 14px;
    border-radius: 2px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:7px;
    transition: all .15s ease;
  }
  .tab-btn .n{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color: var(--text-faint);
  }
  .tab-btn:hover{ border-color: var(--cyan-dim); color: var(--text); }
  .tab-btn.active{
    background: rgba(87,230,212,.08);
    border-color: var(--cyan-dim);
    color: var(--cyan);
  }
  .tab-btn.active .n{ color: var(--cyan-dim); }

  .faq-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top: 14px;
  }
  .list-filter-bar{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .list-filter-bar input{
    flex:1;
    min-width:220px;
    background: #0b1420;
    border: 1px solid var(--line);
    color: var(--text);
    font-family:'IBM Plex Sans KR', sans-serif;
    font-size: 16px;
    padding: 10px 12px;
    border-radius: 2px;
    outline:none;
  }
  .list-filter-bar input:focus{ border-color: var(--cyan-dim); }
  .list-filter-note{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--text-faint);
    white-space:nowrap;
  }
  .faq-item{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow:hidden;
  }
  .faq-q{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding: 16px 18px;
    cursor:pointer;
    font-size: 17px;
    font-weight:500;
    color: var(--text);
    user-select:none;
  }
  .faq-q .mark{
    font-family:'IBM Plex Mono', monospace;
    color: var(--cyan);
    font-weight:600;
    font-size:15.5px;
    flex-shrink:0;
    padding-top:1px;
  }
  .faq-q .chev{
    margin-left:auto;
    color: var(--text-faint);
    font-family:'IBM Plex Mono', monospace;
    transition: transform .15s ease;
    flex-shrink:0;
  }
  .faq-item.open .chev{ transform: rotate(180deg); }
  .faq-a{
    max-height:0;
    overflow:hidden;
    transition: max-height .22s ease;
  }
  .faq-item.open .faq-a{ max-height: 600px; }
  .faq-a-inner{
    padding: 0 18px 18px 44px;
    font-size: 16px;
    line-height:1.8;
    color: var(--text-dim);
    border-top: 1px solid var(--line-soft);
    margin-top: -1px;
    padding-top: 12px;
    white-space:pre-line;
  }
  .faq-a-inner .tag{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color: var(--amber);
    border: 1px solid rgba(242,169,73,.35);
    padding: 1px 6px;
    border-radius:2px;
    margin-bottom:8px;
  }

  footer{
    margin-top: 48px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--text-faint);
    letter-spacing:.05em;
  }

  @media (max-width: 560px){
    .wrap{ padding: 28px 14px 60px; }
    .h1-btn{ font-size:22px; }
    .search-row{ flex-direction:column; }
    .search-row button{ padding: 12px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="sys-label"><span class="dot"></span>S-ARMS · KNOWLEDGE OPS CONSOLE</div>
  <button id="homeBtn" class="h1-btn">S-ARMS VOC 대응 지식베이스</button>
  <p class="sub">서버 구조, 모델·도면 동기화, 펀치 권한 등 축적된 대응 이력과 실제 VOC 사례 117건을 바탕으로 원인과 처리 방법을 안내합니다. 아래 검색창에 문의 내용을 자연어로 입력하세요.</p>

  <div class="console">
    <div class="console-inner">
      <div class="console-top"><span class="tag">QUERY</span><span>입력하신 키워드를 FAQ와 실제 VOC 사례 117건에서 찾아 관련도가 높은 사례 순으로 보여드립니다</span></div>
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="예: 태블릿에서 도면이 파란 깍두기로만 보여요" />
        <button id="searchBtn">문의하기</button>
      </div>
      <div class="quick-chips" id="quickChips"></div>

      <div class="result" id="resultBox">
        <div class="result-meta"><span>▸</span><span class="q-echo" id="resultQ"></span></div>
        <div class="result-body" id="resultBody"></div>
      </div>
    </div>
  </div>

  <div class="tabs-section">
    <div class="tabs-head">
      <h2>자주 묻는 질문</h2>
      <span class="tabs-count" id="tabsCount"></span>
    </div>
    <div class="tab-bar" id="tabBar"></div>
    <div class="faq-list" id="faqList"></div>
  </div>

  <footer>S-ARMS INTERNAL VOC KB · 학습 자료 기반 자동 응답이며 실제 조치 전 서버/DB 확인을 권장합니다</footer>

/* ================= Render FAQ tabs ================= */
const tabBar = document.getElementById('tabBar');
const faqList = document.getElementById('faqList');
const tabsCount = document.getElementById('tabsCount');
let activeTab = FAQ_DATA[0].id;

const VOC_DATA = JSON.parse(document.getElementById('vocDataJson').textContent || "[]");

function renderTabs(){
  tabBar.innerHTML = FAQ_DATA.map(cat => `
    <button class="tab-btn ${cat.id===activeTab?'active':''}" data-id="${cat.id}">
      ${cat.label} <span class="n">${cat.isVoc ? VOC_DATA.length : cat.items.length}</span>
    </button>
  `).join('');
  tabBar.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeTab = btn.dataset.id;
      renderTabs();
      renderFaq();
    });
  });
}

// only one .faq-item stays open at a time within the given container
function setupExclusiveAccordion(container){
  container.querySelectorAll('.faq-item').forEach(el=>{
    el.querySelector('.faq-q').addEventListener('click', ()=>{
      const wasOpen = el.classList.contains('open');
      container.querySelectorAll('.faq-item.open').forEach(o => o.classList.remove('open'));
      if(!wasOpen) el.classList.add('open');
    });
  });
}

function escapeHtmlText(s){
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderFaq(){
  const cat = FAQ_DATA.find(c=>c.id===activeTab);
  if(cat.isVoc){
    renderVocList();
    return;
  }
  tabsCount.textContent = `${FAQ_DATA.reduce((s,c)=> s + (c.isVoc ? VOC_DATA.length : c.items.length), 0)}건 중 ${cat.items.length}건 표시`;
  faqList.innerHTML = cat.items.map((item, idx)=>`
    <div class="faq-item" data-idx="${idx}">
      <div class="faq-q">
        <span class="mark">Q${String(idx+1).padStart(2,'0')}</span>
        <span>${item.q}</span>
        <span class="chev">▾</span>
      </div>
      <div class="faq-a">
        <div class="faq-a-inner">
          <span class="tag">${item.tag}</span><br/>
          ${item.a}
        </div>
      </div>
    </div>
  `).join('');
  setupExclusiveAccordion(faqList);
}

let vocFilter = "";
function renderVocList(){
  const total = VOC_DATA.length;
  const q = vocFilter.trim().toLowerCase();
  const filtered = q
    ? VOC_DATA.filter(r =>
        r.id.includes(q) ||
        r.site.toLowerCase().includes(q) ||
        r.status.toLowerCase().includes(q) ||
        r.content.toLowerCase().includes(q) ||
        r.cause.toLowerCase().includes(q) ||
        r.action.toLowerCase().includes(q) ||
        r.result.toLowerCase().includes(q))
    : VOC_DATA;

  tabsCount.textContent = `${FAQ_DATA.reduce((s,c)=> s + (c.isVoc ? VOC_DATA.length : c.items.length), 0)}건 중 ${filtered.length}건 표시`;

  const shown = filtered.slice(0, 60);

  faqList.innerHTML = `
    <div class="list-filter-bar">
      <input type="text" id="vocFilterInput" placeholder="사이트, 키워드로 실제 VOC 사례 검색 (예: 펀치, 도면, RLP)" value="${vocFilter.replace(/"/g,'&quot;')}" />
      <span class="list-filter-note">${filtered.length > 60 ? '상위 60건 표시 · 검색어를 좁혀보세요' : `총 ${total}건 · 최근 등록순 정렬`}</span>
    </div>
    <div class="faq-list" style="margin-top:12px;">
    ${shown.map((r, idx) => `
      <div class="faq-item" data-idx="${idx}">
        <div class="faq-q">
          <span class="mark">#${r.id}</span>
          <span>${escapeHtmlText(r.content) || "(내용 없음)"}</span>
          <span class="chev">▾</span>
        </div>
        <div class="faq-a">
          <div class="faq-a-inner">
            <span class="tag">${escapeHtmlText(r.site) || "공통"}</span> <span class="tag" style="color:var(--text-dim); border-color:var(--line);">${escapeHtmlText(r.status) || "상태 미기재"}</span>
            <div style="margin-top:12px;"><strong style="color:var(--cyan);">① VOC 내용</strong><div style="white-space:pre-wrap; margin-top:4px;">${escapeHtmlText(r.content) || "-"}</div></div>
            <div style="margin-top:14px;"><strong style="color:var(--cyan);">② 발생 원인</strong><div style="white-space:pre-wrap; margin-top:4px;">${escapeHtmlText(r.cause) || "-"}</div></div>
            <div style="margin-top:14px;"><strong style="color:var(--cyan);">③ 조치 방안</strong><div style="white-space:pre-wrap; margin-top:4px;">${escapeHtmlText(r.action) || "-"}</div></div>
            <div style="margin-top:14px;"><strong style="color:var(--cyan);">④ 조치 결과</strong><div style="white-space:pre-wrap; margin-top:4px;">${escapeHtmlText(r.result) || "-"}</div></div>
          </div>
        </div>
      </div>
    `).join('')}
    </div>
  `;

  const input = document.getElementById('vocFilterInput');
  input.addEventListener('input', (e)=>{
    vocFilter = e.target.value;
    renderVocList();
    const el = document.getElementById('vocFilterInput');
    el.focus();
    el.selectionStart = el.selectionEnd = el.value.length;
  });
  setupExclusiveAccordion(faqList);
}

renderTabs();
renderFaq();

/* ================= Quick chips (feed into search) ================= */
const QUICK_QUERIES = [
  "태블릿 도면이 파란 깍두기로만 보여요",
  "UPV엔 있는데 S-ARMS에서 모델이 안 보여요",
  "펀치 오토메일 그만 받고 싶대요",
  "도면 번호 검색이 안 돼요"
];
const quickChips = document.getElementById('quickChips');
quickChips.innerHTML = QUICK_QUERIES.map(q=>`<span class="chip">${q}</span>`).join('');
quickChips.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.getElementById('searchInput').value = chip.textContent;
    runSearch();
  });
});

/* ================= Search (local matching over FAQ) ================= */
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const resultBox = document.getElementById('resultBox');
const resultQ = document.getElementById('resultQ');
const resultBody = document.getElementById('resultBody');

function buildSearchCorpus(){
  const corpus = [];
  FAQ_DATA.forEach(cat=>{
    cat.items.forEach(item=>{
      const kw = item.keywords || [];
      corpus.push({
        type: 'faq',
        category: cat.label,
        tag: item.tag,
        title: item.q,
        body: item.a,
        titleLower: item.q.toLowerCase(),
        bodyLower: item.a.toLowerCase(),
        kwLower: kw.join(' \u241f ').toLowerCase(), // joined with a separator that won't collide
        compact: normalizeCompact(item.q + ' ' + item.a + ' ' + kw.join(' '))
      });
    });
  });
  VOC_DATA.forEach(r=>{
    const body = `발생 원인\n${r.cause || '-'}\n\n조치 방안\n${r.action || '-'}\n\n조치 결과\n${r.result || '-'}`;
    corpus.push({
      type: 'voc',
      category: '실제 VOC 사례',
      tag: r.site || '공통',
      title: `#${r.id} ${r.content}`,
      body: body,
      titleLower: (r.content || '').toLowerCase(),
      bodyLower: body.toLowerCase(),
      kwLower: '',
      compact: normalizeCompact(r.content + ' ' + r.cause + ' ' + r.action + ' ' + r.result + ' ' + r.site + ' ' + r.id)
    });
  });
  return corpus;
}

// strips spaces/hyphens/punctuation and lowercases, so "S-HUB" / "s hub" / "shub" all match
function normalizeCompact(str){
  return str.toLowerCase().replace(/[^a-z0-9가-힣]/g, '');
}

// common Korean particles (josa), longest first, stripped from the END of a token
// so a query like "모델이" or "도면에서" reduces to its base form ("모델", "도면")
// which is far more likely to appear verbatim inside the corpus text.
const JOSA_LIST = [
  "에서는","에게는","으로는","이라서","이라고","하고는",
  "에서","에게","으로","까지","부터","이나","이랑","한테","에다","라서","라고",
  "은","는","이","가","을","를","에","로","와","과","도","만","의","나"
];
function stripJosa(token){
  for(const j of JOSA_LIST){
    if(token.length > j.length + 1 && token.endsWith(j)){
      return token.slice(0, -j.length);
    }
  }
  return token;
}

function tokenize(str){
  return str.toLowerCase()
    .replace(/[^\p{L}\p{N}\s]/gu, ' ')
    .split(/\s+/)
    .filter(t => t.length >= 2)
    .map(stripJosa)
    .filter(t => t.length >= 2);
}

const SEARCH_CORPUS = buildSearchCorpus();

function scoreItem(item, rawLower, rawCompact, tokens){
  let score = 0;

  // Compact match (ignores hyphens/spaces/case) catches things like "shub" == "S-Hub"
  if(rawCompact.length >= 2 && item.compact.includes(rawCompact)) score += 18;

  // Exact phrase match, weighted by which field it lands in
  if(rawLower.length >= 2){
    if(item.kwLower.includes(rawLower)) score += 24;
    if(item.titleLower.includes(rawLower)) score += 16;
    if(item.bodyLower.includes(rawLower)) score += 5;
  }

  // Per-token overlap, same field weighting
  tokens.forEach(t=>{
    if(item.kwLower.includes(t)) score += 8;
    if(item.titleLower.includes(t)) score += 4;
    if(item.bodyLower.includes(t)) score += 1.2;
  });

  return score;
}

function escapeHtml(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

searchBtn.addEventListener('click', runSearch);
searchInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') runSearch(); });

// Minimum score to be considered a confident match. Below this, results are
// too weak (single generic-word overlap) to be worth showing as an answer.
const CONFIDENCE_THRESHOLD = 9;
const MAX_RESULTS = 4;

function runSearch(){
  const q = searchInput.value.trim();
  if(!q) return;

  resultBox.classList.add('show');
  resultQ.textContent = `"${q}"`;

  const rawLower = q.toLowerCase();
  const rawCompact = normalizeCompact(q);
  const tokens = tokenize(q);

  const scored = SEARCH_CORPUS
    .map(item => ({ item, score: scoreItem(item, rawLower, rawCompact, tokens) }))
    .sort((a,b) => b.score - a.score);

  const confident = scored.filter(s => s.score >= CONFIDENCE_THRESHOLD).slice(0, MAX_RESULTS);

  if(confident.length === 0){
    resultBody.innerHTML = `일치하는 답변을 찾지 못했습니다. 증상을 조금 더 구체적으로 입력해 보시거나(예: "도면 안 열려요", "펀치 권한 없어요"), 아래 탭에서 관련 카테고리를 직접 살펴봐 주세요.`;
    return;
  }

  resultBody.innerHTML = confident.map(({item}, idx) => `
    <div style="margin-bottom:${idx < confident.length-1 ? '18px' : '0'}; padding-bottom:${idx < confident.length-1 ? '18px' : '0'}; border-bottom:${idx < confident.length-1 ? '1px solid var(--line-soft)' : 'none'};">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;">
        <span style="font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--cyan); border:1px solid var(--cyan-dim); padding:2px 7px; border-radius:2px;">${escapeHtml(item.category)}</span>
        ${item.tag ? `<span style="font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--text-faint);">${escapeHtml(item.tag)}</span>` : ''}
      </div>
      <div style="font-weight:600; margin-bottom:8px; font-size:17px;">${escapeHtml(item.title)}</div>
      <div style="color:var(--text-dim); font-size:16px; white-space:pre-wrap; line-height:1.75;">${escapeHtml(item.body)}</div>
    </div>
  `).join('');
}

/* ================= Home button: reset to initial screen ================= */
document.getElementById('homeBtn').addEventListener('click', ()=>{
  searchInput.value = '';
  resultBox.classList.remove('show');
  resultBody.innerHTML = '';
  vocFilter = '';
  activeTab = FAQ_DATA[0].id;
  renderTabs();
  renderFaq();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

</script>
